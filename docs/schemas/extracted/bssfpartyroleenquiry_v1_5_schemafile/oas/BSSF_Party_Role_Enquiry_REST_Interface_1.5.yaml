          maxLength: 256
          nullable: true
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    TargetEntity.1:
      description: "Target entity."
      type: "object"
      additionalProperties: true
      properties:
        entityType:
          description: "The type of the entity."
          type: "string"
          maxLength: 128
          nullable: true
        id:
          description: "Identifier of the target entity."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "External identifier of the target entity."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    TimePeriod.1:
      description: "StartDateTime must be earlier than EndDateTime."
      type: "object"
      additionalProperties: true
      properties:
        startDateTime:
          description: "Start dateTime of the time period. The value is inclusive, including the starting point of the interval. The pattern is based on the definition found at http://www.w3.org/TR/xmlschema-2/#dateTime."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        endDateTime:
          description: "End dateTime of the time period. The value is exclusive, excluding the ending point of the interval. The pattern is based on the definition found at http://www.w3.org/TR/xmlschema-2/#dateTime."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
    TimeZone.1:
      description: "Data structure containing time-zone and validity period."
      type: "object"
      additionalProperties: true
      properties:
        timeZone:
          description: "The name of the time zone according to IANA Time Zone Database, for example Europe/Paris."
          type: "string"
          maxLength: 32
          nullable: true
        validFor:
          description: "Time period the time zone is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
    ValueWithUoM.1:
      description: "The versions of the value."
      type: "object"
      additionalProperties: true
      properties:
        value:
          description: "The value."
          type: "string"
          maxLength: 256
          nullable: true
        unitOfMeasure:
          description: "The unit of measure of the value."
          type: "string"
          maxLength: 32
          nullable: true
    WeekdayTimePeriod.1:
      description: "Common sub-data structure that contains a week day and start and end time for week day."
      type: "object"
      additionalProperties: true
      properties:
        weekday:
          description: "Number of the day of a week. Example is 1 for Monday."
          type: "integer"
          format: "int32"
          minimum: 0
          maximum: 6
        start:
          description: "The start time of weekday. Example is '14:35:05.003+01:00'."
          type: "string"
          pattern: "^(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000)?)(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|10|11):[0-5][0-9]|12:00))$"
        end:
          description: "The end time of weekday. Example is '14:35:05.003+01:00'."
          type: "string"
          pattern: "^(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000)?)(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|10|11):[0-5][0-9]|12:00))$"
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
