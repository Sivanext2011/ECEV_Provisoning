components:
  schemas:
    Action.1:
      description: "Action structure."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the action."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the action in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        name:
          description: "Name given to this action. Not guaranteed to be unique."
          type: "string"
          maxLength: 256
          nullable: true
        type:
          description: "The type of this action."
          type: "string"
          maxLength: 256
          nullable: true
        actionCharacteristicSpecificationUse:
          description: "A list of product offering price specification characteristic uses."
          type: "array"
          items:
            $ref: "#/components/schemas/ActionCharacteristicSpecificationUse.1"
    ActionCharacteristicSpecificationUse.1:
      description: "Action Characteristic Specification Use structure."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the action characteristic specification use."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the action characteristic specification use in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        name:
          description: "Name given to this action characteristic specification use . Not guaranteed to be unique."
          type: "string"
          maxLength: 256
          nullable: true
        measure:
          description: "This is used to set the measure of the characteristic values, such as Data or weight or length etc. The UnitOfMeasure at characteristicValue then has actual UOM such as KB, MB or MG, KG, etc."
          type: "string"
          maxLength: 256
          nullable: true
        actionCharacteristicSpecificationValueUse:
          description: "Characteristic Specification Value Use."
          type: "array"
          items:
            $ref: "#/components/schemas/ActionCharacteristicSpecificationValueUse.1"
        actionCharacteristicSpecificationType:
          description: "This is the action characteristic type, such as price, productBucketRef etc"
          type: "string"
          maxLength: 256
          nullable: true
        actionCharacteristicSpecificationValueType:
          description: "This is the action characteristic value type, such as string, boolean etc"
          type: "string"
          maxLength: 256
          nullable: true
    ActionCharacteristicSpecificationUseRef.1:
      description: "The action characteristic specification use reference."
      type: "object"
      additionalProperties: false
      properties:
        id:
          description: "The ID of the referenced action characteristic specification use."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "The external ID of the referenced action characteristic specification use."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    ActionCharacteristicSpecificationUse_Request.1:
      description: "Action Characteristic Specification Use structure."
      type: "object"
      additionalProperties: false
      properties:
        actionCharacteristicSpecificationUseRef:
          description: "Reference to the action characteristic specification use template."
          $ref: "#/components/schemas/ActionCharacteristicSpecificationUseRef.1"
        actionCharacteristicSpecificationValueUse:
          description: "Characteristic Specification Value Use."
          type: "array"
          items:
            $ref: "#/components/schemas/ActionCharacteristicSpecificationValueUse_Request.1"
    ActionCharacteristicSpecificationValueUse.1:
      description: "Action Characteristic Specification Value Use structure."
      type: "object"
      additionalProperties: true
      properties:
        value:
          description: "The value."
          type: "string"
          maxLength: 256
          nullable: true
        valueReference:
          description: "A reference to a value that the characteristic can take on."
          $ref: "#/components/schemas/Reference.1"
        unitOfMeasure:
          description: "The Unit of unitOfMeasure."
          type: "string"
          maxLength: 256
          nullable: true
    ActionCharacteristicSpecificationValueUse_Request.1:
      description: "Action Characteristic Specification Value Use structure."
      type: "object"
      additionalProperties: false
      properties:
        value:
          description: "The value."
          type: "string"
          maxLength: 256
          nullable: true
        valueReference:
          description: "A reference to a value that the characteristic can take on."
          $ref: "#/components/schemas/Reference_Request.1"
        unitOfMeasure:
          description: "The Unit of unitOfMeasure."
          type: "string"
          maxLength: 256
          nullable: true
    ActionRef.1:
      description: "Reference of the action."
      type: "object"
      additionalProperties: false
      properties:
        id:
          description: "The ID of the referenced action."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "The external ID of the referenced action."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    Action_Request.1:
      description: "Action structure."
      type: "object"
      additionalProperties: false
      properties:
        actionRef:
          description: "Reference to the action."
          $ref: "#/components/schemas/ActionRef.1"
        actionCharacteristicSpecificationUse:
          description: "A list of product offering price specification characteristic uses."
          type: "array"
          items:
            $ref: "#/components/schemas/ActionCharacteristicSpecificationUse_Request.1"
    BucketSpecificationRef.1:
      description: "The bucket specification reference."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "The ID of the referenced bucket specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "The external ID of the referenced bucket specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        measure:
          description: "The thing that is measured using the bucket, like money, length, data, volume, duration etc."
          type: "string"
          maxLength: 256
          nullable: true
        type:
          description: "The type of bucket specification."
          type: "string"
          enum:
            - "PRODUCT_ACCOUNT"
            - "PRODUCT_COUNTER"
            - "SHARING_LIMIT"
            - "AGGREGATE_ACCOUNT"
            - "AGGREGATE_COUNTER"
