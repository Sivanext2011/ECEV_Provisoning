tags:
  - name: "Applied Partner Settlement Rate"
    description: "The applied partner settlement rate"
  - name: "Partner Settlement Note"
    description: "A settlement note is containing the amount that needs to be paid to a partner."
  - name: "Partner Settlement Note On Demand"
    description: "A settlement note is containing the amount that needs to be paid to a partner."
  - name: "Partner Unsettled Charge"
    description: "The Unsettled charges of a partner's settlement account for which the settlement note is not yet generated."
  - name: "Settlement Note Contract View"
    description: "The Settlement contract view."
  - name: "Settlement Note Summary View"
    description: "The Settlement Note summary view."
servers:
  - url: "{scheme}://{host}:{port}/{deploymentComponent}"
    description: "The production API server."
    variables:
      scheme:
        description: "request scheme"
        enum:
          - "http"
          - "https"
        default: "https"
      host:
        default: "host"
        description: "This value is assigned by the service provider."
      port:
        description: "The port of the service."
        default: "8080"
      deploymentComponent:
        description: "The deploymentComponent of the service."
        default: "bae"
