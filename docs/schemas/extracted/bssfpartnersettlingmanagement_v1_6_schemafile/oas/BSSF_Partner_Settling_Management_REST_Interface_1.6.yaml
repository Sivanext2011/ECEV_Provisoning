        - name: "id"
          in: "query"
          schema:
            description: "Unique identifier for the settlement note."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Partner Settlement Note ID - e.g. \"5e943fd9-27bb-426e-a764-1f4bbe8f6174\""
        - name: "settlementNoteNo"
          in: "query"
          schema:
            description: "Settlement note reference known by the party."
            type: "string"
            maxLength: 256
          required: false
          description: "The settlement note reference known by the partner."
        - name: "relatedPartyId"
          in: "query"
          schema:
            description: "Unique identifier of the party or party role."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Party (Role) Id - e.g. \"bacae1ae-ea85-4397-95d5-29ce56157ffa\""
        - name: "relatedPartyExternalId"
          in: "query"
          schema:
            description: "External identifier of the party or party role."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Party (Role) External Id."
        - name: "relatedPartyReferredType"
          in: "query"
          schema:
            description: "Referred Type."
            type: "string"
            maxLength: 128
          required: false
          description: "The kind of Party (Role)."
        - name: "settlementAccountId"
          in: "query"
          schema:
            description: "Unique identifier of the account."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Settlement Account ID -  e.g. \"94502a0c-7a24-4ee4-9a54-c23b35a98aed\""
        - name: "settlementAccountExternalId"
          in: "query"
          schema:
            description: "Unique identifier of the account populated by external system."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Settlement Account External ID."
        - name: "settlementNoteGenerationStartDateTime"
          in: "query"
          schema:
            description: "The date/time when the settlement note was generated."
            type: "string"
            pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
          required: false
          description: "Search criteria for settlement notes generated after or at this date-time."
        - name: "settlementNoteGenerationEndDateTime"
          in: "query"
          schema:
            description: "The date/time when the settlement note was generated."
            type: "string"
            pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
          required: false
          description: "Search criteria for settlement notes generated before this date-time."
        - name: "numberOfLatestSettlementNotes"
          in: "query"
          schema:
            description: "Number of the latest settlement notes"
            type: "integer"
            format: "int64"
            minimum: 0
            maximum: 9223372036854775806
          required: false
          description: "Search for the n last settlement notes."
        - name: "category"
          in: "query"
          schema:
            description: "Category of the settlement note."
            type: "string"
            enum:
              - "REGULAR"
          required: false
          description: "Search limiting to the specified category"
        - name: "runType"
          in: "query"
          schema:
            description: "The run type of the settlement note."
            type: "string"
            enum:
              - "ON_CYCLE"
              - "OFF_CYCLE"
          required: false
          description: "Search limiting to the specified run type"
      responses:
        "200":
          description: "OK"
          content:
            ? application/json;charset=utf-8;profile="http://ericsson.com/bss.bssfPartnerSettlingManagement.partnerSettlementNote.readResponse.1.json#"
