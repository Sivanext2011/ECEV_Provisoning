tags:
  - name: "Financial Customer Account"
    description: "A financial customer account provide the financial details of a customer."
servers:
  - url: "{scheme}://{host}:{port}/{deploymentComponent}"
    description: "The production API server."
    variables:
      scheme:
        description: "request scheme"
        enum:
          - "http"
          - "https"
        default: "https"
      host:
        default: "host"
        description: "This value is assigned by the service provider."
      port:
        description: "The port of the service."
        default: "8080"
      deploymentComponent:
        description: "The deploymentComponent of the service."
        default: "bae"
paths:
  /bssfFinancialCustomerAccountEnquiry/v1/financialCustomerAccount:
    get:
      tags:
        - "Financial Customer Account"
      summary: "Read Financial Customer Account information."
      description: "Read Financial Customer Account information."
      operationId: "readFinancialCustomerAccountBssfFinancialCustomerAccountEnquiryV1FinancialCustomerAccount"
      parameters:
        - name: "Accept"
          in: "header"
          description: "Accepted media type and schemas by the client. See 'responses.&lt;code&gt;.content.&lt;media-type&gt;'."
          schema:
            type: "string"
        - name: "Authorization"
          in: "header"
          description: "Placeholder of the authorization bearer and token."
          schema:
            type: "string"
            pattern: "^Bearer "
        - name: "ERICSSON.Generic-Interface-Parameters"
          in: "header"
          description: "Generic Interface Parameters. BASE64 encoded and GZIP compressed."
          schema:
            type: "string"
            pattern: "^[a-zA-Z0-9\\+\\/]*[=]{0,2}$"
        - name: "relatedPartyId"
          in: "query"
          schema:
            description: "Unique identifier of the party or party role."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Party (Role) Id - e.g. \"bacae1ae-ea85-4397-95d5-29ce56157ffa\""
        - name: "relatedPartyExternalId"
          in: "query"
          schema:
            description: "External identifier of the party or party role."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Party (Role) External Id"
        - name: "relatedPartyReferredType"
          in: "query"
          schema:
            description: "Referred Type."
            type: "string"
            maxLength: 128
          required: false
          description: "The kind of Party (Role)."
        - name: "communicationId"
          in: "query"
          schema:
            description: "Communication ID value."
            type: "string"
            maxLength: 512
          required: false
          description: "Value of Communication ID."
        - name: "communicationIdType"
          in: "query"
          schema:
            description: "Communication ID type."
            type: "string"
            maxLength: 32
          required: false
          description: "Type of Communication ID."
      responses:
        "200":
          description: "OK"
          content:
            ? application/json;charset=utf-8;profile="http://ericsson.com/bss.bssfFinancialCustomerAccountEnquiry.financialCustomerAccount.readResponse.1.json#"
            : schema:
                $ref: "#/components/schemas/FinancialCustomerAccount.1"
          headers:
            Content-Type:
              description: "Selected media type and schemas by the server. See 'responses.&lt;code&gt;.content.&lt;media-type&gt;'."
              schema:
                type: "string"
            ERICSSON.Generic-Interface-Parameters:
              description: "Generic Interface Parameters.\nBASE64 encoded and GZIP compressed."
              schema:
                type: "string"
                pattern: "^[a-zA-Z0-9\\+\\/]*[=]{0,2}$"
