components:
  schemas:
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    FinancialCustomerAccount.1:
      description: "Financial customer account enquiry provides the ability to obtain customer details for a customer."
      type: "object"
      additionalProperties: true
      properties:
        relatedParty:
          description: "Reference to related party roles"
          type: "array"
          items:
            $ref: "#/components/schemas/RelatedParty.1"
        financialEntrySummary:
          description: "The summary of financial entries."
          type: "array"
          items:
            $ref: "#/components/schemas/FinancialEntrySummary.1"
        amount:
          description: "Amount of a financial customer account."
          $ref: "#/components/schemas/MonetaryAmount.1"
        openDebitAmount:
          description: "Open debit amount of a financial customer account."
          $ref: "#/components/schemas/MonetaryAmount.1"
        overdueAmount:
          description: "Overdue amount of a financial customer account."
          $ref: "#/components/schemas/MonetaryAmount.1"
    FinancialEntrySummary.1:
      description: "Financial entry summary provides the financial details for a customer."
      type: "object"
      additionalProperties: true
      properties:
        creditAmount:
          description: "Credit amount of financial entries."
          $ref: "#/components/schemas/MonetaryAmount.1"
        debitAmount:
          description: "Debit amount of financial entries."
          $ref: "#/components/schemas/MonetaryAmount.1"
        duration:
          description: "The duration of financial entries."
          type: "string"
          pattern: "^(-?)P(?=\\d|T\\d)(?:(\\d+)Y)?(?:(\\d+)M)?(?:(\\d+)D)?(?:T(?:(\\d+)H)?(?:(\\d+)M)?(?:(\\d+(?:\\.\\d{1,3})?)S)?)?$"
        financialEntryType:
          description: "Type of Financial entry."
          type: "string"
          maxLength: 32
          nullable: true
    MonetaryAmount.1:
      description: "The versions of the value."
      type: "object"
      additionalProperties: true
      properties:
        creditDebitFlag:
          description: "The flag for credit and debit monetary amount"
          type: "string"
          enum:
            - "CREDIT"
            - "DEBIT"
        currencyAmount:
          description: "The unit of measure of the value."
          $ref: "#/components/schemas/UnsignedAmountWithUoM.1"
    RelatedParty.1:
      description: "Related Party or Party Role"
      type: "object"
      additionalProperties: true
      properties:
        '@referredType':
          description: "Referred Type."
          type: "string"
          maxLength: 128
          nullable: true
        externalId:
          description: "External identifier of the party or party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the party or party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    SupplementaryError.2:
      description: "Supplementary error message structure. In case of partial error scenarios, this structure may also include successful responses to show what parts went ok."
      type: "object"
      additionalProperties: true
      properties:
        source:
          description: "Source of error."
          type: "string"
          maxLength: 256
          nullable: true
        action:
          description: "Action causing error."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    UnsignedAmountWithUoM.1:
      description: "The versions of the value."
      type: "object"
      additionalProperties: true
      properties:
        value:
          description: "The value."
          $ref: "#/components/schemas/UnsignedDecimal.1"
        unitOfMeasure:
          description: "The unit of measure of the value."
          type: "string"
          maxLength: 32
          nullable: true
    UnsignedDecimal.1:
      description: "Amount representation."
      type: "object"
      additionalProperties: true
      properties:
        number:
          description: "Carrying a positive value."
          type: "integer"
          format: "int64"
          minimum: 0
          maximum: 9223372036854775806
        decimalPlaces:
          description: "Number of decimals in the value."
          type: "integer"
          format: "int32"
          minimum: 0
          maximum: 6
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
