 way.\nThis leads to incorrect generation of Java code.\n\n- The artifact lacks vital information required for documentation purposes.\n\n\n## 3PP's\n\nThis type of artifact and its related syntax do not take any responsibility for issues related to using a Third Party Product (3PP) to further process the artifact into other types of format and syntax.\n\nFor example, when the OAS is processed by a code generator (e.g. OpenAPI Generator), editor/viewer (e.g. Swagger Editor), documentation generator (e.g. RapiDoc, RapiPdf) with format such as (e.g. HTML, PDF), XML tags (e.g. open or/and closed tags) rendering (e.g. static/dynamic HTML), etc.\n\nAny issues related to the use of 3PP-tools need to be directed to the vendor of the tool or within Ericsson (Ericsson Library Builder, ELIB Web Service), to be fixed.\n\n\n## OpenAPI Generator\n\nThis artifact is validated by performing code generation targeting the Spring Boot framework.\nThis means that execution of the code generator does not generate any error messages that stops it from completing the code generation.\n\n- Server: `java -jar openapi-generator-cli-5.4.0.jar generate -g spring`\n\n\n## OpenAPI Linter\n\nThis artifact is validated using Spectral Linter `v6.15.0` by Stoplight.\n\n## Deployments\n\nThis information is intended exclusively for demonstration purposes when used in the development of client-side integrations. It may not include definitions for various elements or behaviors that could arise from client-server interactions involving any third-party products, providers, or deployment platforms, whether external or internal to the delivered product.\n\n\n# Description\n\nThe Balance Management applications are responsible for activities related to the creation and maintenance of the balances of a customer and/or a subscriber. Balances may be shared e.g. between subscribers in a hierarchy. Balance can be managed at most granule level, for example at the level of subscription. These processes will be required to support both batch and real-time processing."
