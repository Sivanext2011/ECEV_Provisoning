components:
  schemas:
    AccountExternalLocation.1:
      description: "Account external location."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Account external location id."
          type: "string"
          maxLength: 256
          nullable: true
        ip:
          description: "Account external location ip."
          type: "string"
          maxLength: 256
          nullable: true
    Communication.1:
      description: "Represent Communication with id & type"
      type: "object"
      additionalProperties: true
      properties:
        idType:
          description: "Communication ID type."
          type: "string"
          maxLength: 32
          nullable: true
        id:
          description: "Communication ID value."
          type: "string"
          maxLength: 512
          nullable: true
    CommunicationIdentity.1:
      description: "Communication identity."
      type: "object"
      additionalProperties: true
      properties:
        communicationIdentity:
          description: "Array of Communication ID and Type, for example MSISDN, IMSI."
          type: "array"
          items:
            $ref: "#/components/schemas/Communication.1"
        primaryCommunicationId:
          description: "Primary communication."
          $ref: "#/components/schemas/Communication.1"
        accountExternalLocation:
          description: "Account external location."
          $ref: "#/components/schemas/AccountExternalLocation.1"
        customerPartitionId:
          description: "Customer partition."
          type: "string"
          maxLength: 256
          nullable: true
        siteName:
          description: "Customer site name."
          type: "string"
          maxLength: 32
          nullable: true
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    SupplementaryError.2:
      description: "Supplementary error message structure. In case of partial error scenarios, this structure may also include successful responses to show what parts went ok."
      type: "object"
      additionalProperties: true
      properties:
        source:
          description: "Source of error."
          type: "string"
          maxLength: 256
          nullable: true
        action:
          description: "Action causing error."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
