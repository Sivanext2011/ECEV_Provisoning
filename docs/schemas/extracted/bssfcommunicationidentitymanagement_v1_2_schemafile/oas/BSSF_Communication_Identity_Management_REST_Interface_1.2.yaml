            description: "Communication ID value."
            type: "string"
            maxLength: 512
          required: false
          description: "Communication Identity"
        - name: "communicationIdType"
          in: "query"
          schema:
            description: "Communication ID type."
            type: "string"
            maxLength: 32
          required: false
          description: "Communication Identity type"
        - name: "validAt"
          in: "query"
          schema:
            description: "This type defines a dateTime value. The pattern is based on the definition found at http://www.w3.org/TR/xmlschema-2/#dateTime. No validation of leap year is done in the schema so YYYY-02-29 is regarded as a valid date in the pattern. Only year values >= 0000 are allowed. Fractional seconds with three decimals are also mandatory. Leap seconds are not supported. Timezone information is mandatory. Valid UTC offsets are -12:00 to +14:00. The value '9999-12-31T12:00:00.001+00:00' represents infinity (no end date and time). The value '0001-01-01T12:00:00.001+00:00' represents Beginning of time (no start date and time). Example values are '2014-03-18T14:35:05.003Z' and 2014-03-18T14:35:05.003+01:00. The latter example is the recommended format."
            type: "string"
            pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
          required: false
          description: "Communication Identity Validity"
      responses:
        "200":
          description: "OK"
          content:
            ? application/json;charset=utf-8;profile="http://ericsson.com/bss.bssfCommunicationIdentityManagement.communicationIdentity.readResponse.1.json#"
