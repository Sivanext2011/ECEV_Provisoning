    WeekdayTimePeriod.1:
      description: "Common sub-data structure that contains a week day and start and end time for week day."
      type: "object"
      additionalProperties: true
      properties:
        weekday:
          description: "Number of the day of a week. Example is 1 for Monday."
          type: "integer"
          format: "int32"
          minimum: 0
          maximum: 6
        start:
          description: "The start time of weekday. Example is '14:35:05.003+01:00'."
          type: "string"
          pattern: "^(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000)?)(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|10|11):[0-5][0-9]|12:00))$"
        end:
          description: "The end time of weekday. Example is '14:35:05.003+01:00'."
          type: "string"
          pattern: "^(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000)?)(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|10|11):[0-5][0-9]|12:00))$"
