components:
  schemas:
    Agreement.1:
      description: "An Agreement is an entity that governs entities such as Contracts and Billing accounts and is associated to parties."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the agreement instance."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the agreement instance in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        agreementSpecId:
          description: "Unique identifier of an agreement specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        agreementSpecExternalId:
          description: "Identifier of an agreement specification in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        validFor:
          description: "The time period that the agreement is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        characteristic:
          description: "A list of agreement characteristic values. Only if the characteristics need to be personalized."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValue.2"
        status:
          description: "A list of statuses linked to the agreement."
          type: "array"
          items:
            $ref: "#/components/schemas/Status.1"
        engagedPartyRole:
          description: "A list of party role references representing the part played by a party in the agreement."
          type: "array"
          items:
            $ref: "#/components/schemas/PartyRoleReference.1"
        billingAccount:
          description: "A list of billing accounts that are governed by this agreement instance."
          type: "array"
          items:
            $ref: "#/components/schemas/BillingAccount.2"
        contract:
          description: "A list of contracts that are governed by this agreement instance."
          type: "array"
          items:
            $ref: "#/components/schemas/Contract.2"
        product:
          description: "A list of products that are governed by this agreement instance."
          type: "array"
          items:
            $ref: "#/components/schemas/Product.2"
        parentAgreement:
          description: "References to parent/grandparent agreements."
          type: "array"
          items:
            $ref: "#/components/schemas/AgreementReference.1"
        childAgreement:
          description: "References to agreements governed by this agreement."
          type: "array"
          items:
            $ref: "#/components/schemas/AgreementReference.1"
    AgreementReference.1:
      description: "Agreement Reference."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the agreement instance."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the agreement in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    BillingAccount.2:
      description: "A billing account accumulates all charges from products and contracts that will be shown on the same invoice or prepaid statement."
      type: "object"
      additionalProperties: true
      properties:
        externalId:
          description: "Unique identifier of the account populated by external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the account."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    CharacteristicValue.2:
      description: "A value of a Characteristic."
      type: "object"
      additionalProperties: true
      properties:
        charSpecId:
          description: "The ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        charSpecExternalId:
          description: "The External ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        validFor:
          description: "The time period that the characteristic value is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        value:
          description: "The versions of the value."
          type: "array"
          items:
            $ref: "#/components/schemas/ValueWithUoM.1"
        comprisedOf:
          description: "Child/Children of the characteristic value, if any."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValueNoValidFor.1"
    CharacteristicValueNoValidFor.1:
      description: "A value of a Characteristic."
      type: "object"
      additionalProperties: true
      properties:
        charSpecId:
          description: "The ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        charSpecExternalId:
          description: "The External ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        value:
          description: "The versions of the value."
          type: "array"
          items:
            $ref: "#/components/schemas/ValueWithUoM.1"
        comprisedOf:
          description: "Child/Children of the characteristic value, if any."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValueNoValidFor.1"
    Contract.2:
      description: "Contract."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the contract."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "External identifier of the contract for interaction in external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    ErrorMessage.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        action:
          description: "The action."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "The code."
          type: "string"
          maxLength: 256
          nullable: true
        details:
          description: "The details."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "The message."
          type: "string"
          maxLength: 256
          nullable: true
        source:
          description: "The source."
          type: "string"
          maxLength: 256
          nullable: true
    ErrorMessageExtended.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        messages:
          description: "Error messages."
          type: "array"
          items:
            $ref: "#/components/schemas/ErrorMessage.1"
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    PartyRoleReference.1:
      description: "A reference to a party role."
      type: "object"
      additionalProperties: true
      properties:
        partyRoleType:
          description: "The type of the party role."
          type: "string"
          maxLength: 128
          nullable: true
        partyRoleId:
          description: "Identifier of the party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        partyRoleExternalId:
          description: "External identifier of the party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    Product.2:
      description: "Product derived from a product offering related to a contract."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of a product."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the product in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    Status.1:
      description: "Structure of one status version element."
      type: "object"
      additionalProperties: true
      properties:
        reason:
          description: "The reason for the new status version."
          type: "string"
          maxLength: 256
          nullable: true
        status:
          description: "The status for the given time period."
          type: "string"
          maxLength: 256
          nullable: true
        validFor:
          description: "Time period where the status is valid."
          $ref: "#/components/schemas/TimePeriod.1"
    SupplementaryError.2:
      description: "Supplementary error message structure. In case of partial error scenarios, this structure may also include successful responses to show what parts went ok."
      type: "object"
      additionalProperties: true
      properties:
        source:
          description: "Source of error."
          type: "string"
          maxLength: 256
          nullable: true
        action:
          description: "Action causing error."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    TimePeriod.1:
      description: "StartDateTime must be earlier than EndDateTime."
      type: "object"
