            type: "string"
        - name: "Authorization"
          in: "header"
          description: "Placeholder of the authorization bearer and token."
          schema:
            type: "string"
            pattern: "^Bearer "
        - name: "ERICSSON.Generic-Interface-Parameters"
          in: "header"
          description: "Generic Interface Parameters. BASE64 encoded and GZIP compressed."
          schema:
            type: "string"
            pattern: "^[a-zA-Z0-9\\+\\/]*[=]{0,2}$"
        - name: "agreementId"
          in: "query"
          schema:
            description: "Unique identifier of the agreement instance."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Agreement ID"
        - name: "agreementExternalId"
          in: "query"
          schema:
            description: "Identifier of the agreement instance in an external system."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
