            type: "string"
            maxLength: 32
          required: false
          description: "Type of Communication ID"
        - name: "partyId"
          in: "query"
          schema:
            description: "Unique identifier for the party as an individual."
            type: "string"
            pattern: "^(?=\\s*\\S).*$"
            maxLength: 256
          required: false
          description: "Unique ID of a party"
        - name: "partyExternalId"
          in: "query"
          schema:
            description: "External identifier for the party as an individual."
