components:
  schemas:
    BalanceTopUpDetails.1:
      description: "Balance topup details."
      type: "object"
      additionalProperties: true
      properties:
        fraudAttempts:
          description: "Number of detected fraud attempts."
          type: "integer"
          format: "int32"
          minimum: -2147483648
          maximum: 2147483647
        fraudThreshold:
          description: "Fraud attempts Threshold."
          type: "integer"
          format: "int32"
          minimum: -2147483648
          maximum: 2147483647
        blockedUntil:
          description: "The balance top up service is blocked up until this point in time."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        resourceFacingServiceSpecId:
          description: "A unique reference to the Resource Facing Service Specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        resourceFacingServiceSpecExternalId:
          description: "An external reference to the Resource Facing Service Specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    BillingAccountBalance.3:
      description: "A billing account balance structure."
      type: "object"
      additionalProperties: true
      properties:
        externalId:
          description: "Unique identifier of the billing account populated by external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the billing account."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        validFor:
          description: "The time period that the billing account is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        status:
          description: "The status of the billing account, for example active."
          type: "array"
          items:
            $ref: "#/components/schemas/Status.1"
        bucket:
          description: "Buckets."
          type: "array"
          items:
            $ref: "#/components/schemas/BillingAccountBucketBalance.3"
    BillingAccountBucketBalance.3:
      description: "Billing account bucket balance."
      type: "object"
      additionalProperties: true
      properties:
        bucketSpecExternalId:
          description: "Uniquely identifying the bucket using the external specification id."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        bucketSpecId:
          description: "Uniquely identifying the bucket using the specification id."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        amount:
          description: "The balance of the Billing Account Bucket."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        reservedAmount:
          description: "The reserved amount on the Billing Account Bucket."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        validFor:
          description: "Validity of the bucket."
          $ref: "#/components/schemas/TimePeriod.1"
        unitOfMeasure:
          description: "Unit of measure for amounts."
          type: "string"
          maxLength: 32
          nullable: true
    Bucket.3:
      description: "Bucket."
      type: "object"
      additionalProperties: true
      properties:
        customerId:
          description: "Represents the customer ID."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
          deprecated: true
        customerExternalId:
          description: "Represents the external customer ID."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
          deprecated: true
        relatedParty:
          description: "Reference to the related Party Role"
          $ref: "#/components/schemas/RelatedParty.1"
        settlementAccount:
          description: "Settlement accounts."
          type: "array"
          items:
            $ref: "#/components/schemas/SettlementAccountBalance.1"
        billingAccount:
          description: "Billing accounts."
          type: "array"
          items:
            $ref: "#/components/schemas/BillingAccountBalance.3"
        product:
          description: "Products."
          type: "array"
          items:
            $ref: "#/components/schemas/ProductBalance.3"
    Decimal_Sensitive.1:
      description: "Amount representation."
      type: "object"
      additionalProperties: true
      properties:
        number:
          description: "Carrying value."
          type: "integer"
          format: "int64"
          minimum: -9223372036854775807
          maximum: 9223372036854775806
        decimalPlaces:
          description: "Number of decimals in the value."
          type: "integer"
          format: "int32"
          minimum: 0
          maximum: 6
    ErrorMessage.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        action:
          description: "The action."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "The code."
          type: "string"
          maxLength: 256
          nullable: true
        details:
          description: "The details."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "The message."
          type: "string"
          maxLength: 256
          nullable: true
        source:
          description: "The source."
          type: "string"
          maxLength: 256
          nullable: true
    ErrorMessageExtended.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        messages:
          description: "Error messages."
          type: "array"
          items:
            $ref: "#/components/schemas/ErrorMessage.1"
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    ProductBalance.3:
      description: "Product Balance."
      type: "object"
      additionalProperties: true
      properties:
        externalId:
          description: "Unique identifier of the product populated by external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the product."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contractExternalId:
          description: "External identifier of the contract where the product belongs."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contractId:
          description: "Unique identifier of the contract where the product belongs."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        validFor:
          description: "The time period that the product is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        status:
          description: "The status of the product."
          type: "array"
          items:
            $ref: "#/components/schemas/Status.1"
        bucket:
          description: "The product buckets."
          type: "array"
          items:
            $ref: "#/components/schemas/ProductBucketBalance.3"
    ProductBucketBalance.3:
      description: "Product Bucket balance."
      type: "object"
      additionalProperties: true
      properties:
        bucketSpecExternalId:
          description: "Uniquely identifying the bucket using the external specification id."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        bucketSpecId:
          description: "Uniquely identifying the bucket using the specification id."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        amount:
          description: "The amount of the bucket."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        replenishedAmount:
          description: "The replenished amount of the bucket."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        reservedAmount:
          description: "The reserved amount on the Bucket."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        validFor:
          description: "Validity of the bucket."
          $ref: "#/components/schemas/TimePeriod.1"
        unitOfMeasure:
          description: "Unit of measure for amounts."
          type: "string"
          maxLength: 32
          nullable: true
        valueContainer:
          description: "Value containers."
          type: "array"
          items:
            $ref: "#/components/schemas/ValueContainer.1"
    RelatedParty.1:
      description: "Related Party or Party Role"
      type: "object"
      additionalProperties: true
      properties:
        '@referredType':
          description: "Referred Type."
          type: "string"
          maxLength: 128
          nullable: true
        externalId:
          description: "External identifier of the party or party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the party or party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    SettlementAccountBalance.1:
      description: "A settlement account balance structure."
      type: "object"
      additionalProperties: true
      properties:
        externalId:
          description: "Unique identifier of the settlement account populated by external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the settlement account."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        validFor:
          description: "The time period that the settlement account is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        status:
          description: "The status of the settlement account, for example active."
