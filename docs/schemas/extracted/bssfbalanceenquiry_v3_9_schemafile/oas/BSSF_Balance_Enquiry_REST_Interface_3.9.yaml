      type: "object"
      additionalProperties: true
      properties:
        amount:
          description: "The amount of this value container."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        replenishedAmount:
          description: "The replenished amount of the value container."
          $ref: "#/components/schemas/Decimal_Sensitive.1"
        validFor:
          description: "The validity period of the value container."
          $ref: "#/components/schemas/TimePeriod.1"
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
