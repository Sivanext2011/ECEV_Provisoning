components:
  schemas:
    Communication.1:
      description: "Represent Communication with id & type"
      type: "object"
      additionalProperties: false
      properties:
        idType:
          description: "Communication ID type."
          type: "string"
          maxLength: 32
          nullable: true
        id:
          description: "Communication ID value."
          type: "string"
          maxLength: 512
          nullable: true
    DiameterSession.1:
      description: "Data structure for diameter session."
      type: "object"
      additionalProperties: true
      properties:
        sessionId:
          description: "Diameter session identifier."
          type: "string"
          maxLength: 256
          nullable: true
        sessionType:
          description: " The type of the diameter session. Sy and ESy are policy session type. dcca is charging session type"
          type: "string"
          enum:
            - "Sy"
            - "ESy"
        serviceContextId:
          description: "Service context identifier."
          type: "string"
          maxLength: 256
          nullable: true
    DiameterSessionDetail.1:
      description: "Data structure for diameter session details."
      type: "object"
      additionalProperties: false
      properties:
        policyClientDiameterRealm:
          description: "Diameter Realm of the policy client."
          type: "string"
          maxLength: 256
          nullable: true
        policyClientDiameterHost:
          description: "Diameter Realm of the policy client."
          type: "string"
          maxLength: 256
          nullable: true
        diameterSessionOriginState:
          description: "Diameter session origin state."
          type: "integer"
          format: "int32"
          minimum: 1
          maximum: 52
    DiameterSessionInfo.1:
      description: "Data structure for diameter session information."
      type: "object"
      additionalProperties: true
      properties:
        sessionCreationTimeStamp:
          description: "Session creation time stamp."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        diameterSession:
          description: "This is list of diameter session."
          type: "array"
          items:
            $ref: "#/components/schemas/DiameterSession_Response.1"
    DiameterSession_Response.1:
      description: "Data structure for diameter session."
      type: "object"
      additionalProperties: true
      properties:
        sessionId:
          description: "Diameter session identifier."
          type: "string"
          maxLength: 256
          nullable: true
        sessionType:
          description: " The type of the diameter session. Sy and ESy are policy session type. dcca is charging session type"
          type: "string"
          enum:
            - "dcca"
        serviceContextId:
          description: "Service context identifier."
          type: "string"
          maxLength: 256
          nullable: true
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    PolicySession.1:
      description: "Data structure for policy session."
      type: "object"
      additionalProperties: false
      properties:
        policySessionId:
          description: "Policy session identifier."
          type: "string"
          maxLength: 256
          nullable: true
        lastModifiedTime:
          description: "Last modified date time."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        subscribedPolicyCounter:
          description: "This is list of subscribed policy counter."
          type: "array"
          items:
            description: "String max 256 characters."
            type: "string"
            maxLength: 256
            nullable: true
        policySessionType:
          description: " The type of the policy session."
          type: "string"
          enum:
            - "Sy"
            - "ESy"
            - "N28"
            - "E-N28"
        diameterSessionDetail:
          description: "Diameter session details."
          $ref: "#/components/schemas/DiameterSessionDetail.1"
        sbiSessionDetail:
          description: "Sbi session details."
          $ref: "#/components/schemas/SbiSessionDetail.1"
    SbiHeader.1:
      description: "Data structure for sbi header."
      type: "object"
      additionalProperties: false
      properties:
        threegppsbibinding:
          description: "Subcriber permanent identifier."
          type: "string"
          maxLength: 256
          nullable: true
    SbiSession.1:
      description: "Data structure for sbi session."
      type: "object"
      additionalProperties: true
      properties:
        sessionId:
          description: "Sbi session identifier."
          type: "string"
          maxLength: 256
          nullable: true
        sessionType:
          description: " The type of the sbi session. N28 and E-N28 are policy session type. N40 is charging session type"
          type: "string"
          enum:
            - "N28"
            - "E-N28"
        serviceContextId:
          description: "Service context identifier."
          type: "string"
          maxLength: 256
          nullable: true
    SbiSessionDetail.1:
      description: "Data structure for policy session."
      type: "object"
      additionalProperties: false
      properties:
        supi:
          description: "Subcriber permanent identifier."
          type: "string"
          maxLength: 256
          nullable: true
        notifUri:
          description: "callback uri associated with the session."
          type: "string"
          maxLength: 256
          nullable: true
        notificationCorrelationId:
          description: "Notification Correlation Id."
          type: "string"
          maxLength: 256
          nullable: true
        subscriptionExpiryTime:
          description: "Subscription Expiry Time."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        sbiHeader:
          description: "This is list of sbi header."
          $ref: "#/components/schemas/SbiHeader.1"
    SbiSessionInfo.1:
      description: "Data structure for sbi session information."
      type: "object"
      additionalProperties: true
      properties:
        sessionCreationTimeStamp:
          description: "Session creation time stamp."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        sbiSession:
          description: "This is list of sbi session."
          type: "array"
          items:
            $ref: "#/components/schemas/SbiSession_Response.1"
    SbiSession_Response.1:
      description: "Data structure for sbi session."
      type: "object"
      additionalProperties: true
      properties:
        sessionId:
          description: "Sbi session identifier."
          type: "string"
          maxLength: 256
          nullable: true
        sessionType:
          description: " The type of the sbi session. N28 and E-N28 are policy session type. N40 is charging session type"
          type: "string"
          enum:
            - "N40"
        serviceContextId:
          description: "Service context identifier."
          type: "string"
          maxLength: 256
          nullable: true
    Session.1:
      description: "Data structure for policy and charging session."
      type: "object"
      additionalProperties: true
      properties:
        customerId:
          description: "The customer identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contractId:
          description: "The contract identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        sessionCreationTimeStamp:
          description: "Session creation time stamp."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        sbiSession:
          description: "This is list of sbi session."
          type: "array"
          items:
            $ref: "#/components/schemas/SbiSession.1"
        diameterSession:
          description: "This is list of diameter session."
          type: "array"
          items:
            $ref: "#/components/schemas/DiameterSession.1"
    Session_Create_Request.1:
      description: "Data structure for policy and charging session."
      type: "object"
      additionalProperties: false
      properties:
        communicationIdentity:
          description: "Communication ID type."
          type: "array"
          items:
            $ref: "#/components/schemas/Communication.1"
        cafSbiCustomerId:
          description: "Customer Id created for the given supi."
          type: "string"
          maxLength: 256
          nullable: true
    Session_Request.1:
      description: "Data structure for policy and charging session."
      type: "object"
      additionalProperties: false
      properties:
        communicationIdentity:
          description: "Communication ID type."
          type: "array"
          items:
            $ref: "#/components/schemas/Communication.1"
        policySession:
          description: "This is list of policy session."
          type: "array"
          items:
            $ref: "#/components/schemas/PolicySession.1"
    Session_Response.1:
      description: "Data structure for policy and charging session."
      type: "object"
      additionalProperties: true
      properties:
        customerId:
          description: "The customer identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contractId:
          description: "The contract identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        sbiSessionInfo:
          description: "This is list of sbi session."
          $ref: "#/components/schemas/SbiSessionInfo.1"
        diameterSessionInfo:
          description: "This is list of diameter session."
          $ref: "#/components/schemas/DiameterSessionInfo.1"
    SupplementaryError.2:
      description: "Supplementary error message structure. In case of partial error scenarios, this structure may also include successful responses to show what parts went ok."
      type: "object"
      additionalProperties: true
      properties:
        source:
          description: "Source of error."
          type: "string"
          maxLength: 256
          nullable: true
        action:
          description: "Action causing error."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
