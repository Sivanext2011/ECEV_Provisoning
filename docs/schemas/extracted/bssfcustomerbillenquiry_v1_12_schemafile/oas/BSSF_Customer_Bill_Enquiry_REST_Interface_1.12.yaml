tags:
  - name: "Applied Customer Billing Rate"
    description: "The applied customer billing rate."
  - name: "Customer Bill"
    description: "A customer bill is the invoice containing the amount for the customer to pay."
  - name: "Customer Bill Contract View"
    description: "The contract view of customer billed or unbilled charges."
  - name: "Customer Bill On Demand"
    description: "A customer bill on demand for a customer is the bill which articulated amount to be payable on demand."
  - name: "Customer Bill Summary View"
    description: "The summary view of customer billed or unbilled charges."
  - name: "Customer Unbilled Charges"
    description: "The unbilled charges of a customer's billing account for which bill is not generated."
servers:
  - url: "{scheme}://{host}:{port}/{deploymentComponent}"
    description: "The production API server."
    variables:
      scheme:
        description: "request scheme"
        enum:
          - "http"
          - "https"
        default: "https"
      host:
        default: "host"
        description: "This value is assigned by the service provider."
      port:
        description: "The port of the service."
        default: "8080"
      deploymentComponent:
        description: "The deploymentComponent of the service."
        default: "bae"
