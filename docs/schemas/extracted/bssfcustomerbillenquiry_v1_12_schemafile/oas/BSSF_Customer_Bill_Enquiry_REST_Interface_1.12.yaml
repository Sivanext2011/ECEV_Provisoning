    UnbilledCharge.1:
      description: "The so far unbilled charges."
      type: "object"
      additionalProperties: true
      properties:
        relatedParty:
          description: "Reference to the related Party Role"
          type: "array"
          items:
            $ref: "#/components/schemas/RelatedParty.1"
        billingAccount:
          description: "Reference to the billing account."
          $ref: "#/components/schemas/BillingAccountReference.1"
        contractViewIndicator:
          description: "Contract view indicator if the contract view can be read for the billing account."
          type: "boolean"
        amount:
          description: "The amount of unbilled charges so far."
          $ref: "#/components/schemas/AmountWithUoM.1"
        amountType:
          description: "Indicator if the unbilled amount is in Gross or Net."
          type: "string"
          enum:
            - "GROSS"
            - "NET"
        taxAmount:
          description: "Tax amount exclusive of Tax on Tax amount."
          $ref: "#/components/schemas/AmountWithUoM.1"
        taxExemptionAmount:
          description: "Tax exemption."
          $ref: "#/components/schemas/AmountWithUoM.1"
        taxOnTaxAmount:
          description: "Tax on Tax amount."
          $ref: "#/components/schemas/AmountWithUoM.1"
        unbilledChargePeriod:
          description: "The period of the unbilled charges since the last completed bill run."
          $ref: "#/components/schemas/TimePeriod.1"
        taxItem:
          description: "The tax items for the bill."
          type: "array"
          items:
            $ref: "#/components/schemas/TaxItem.1"
        summaryView:
          description: "The list of summary view."
          type: "array"
          items:
            $ref: "#/components/schemas/BillViewSpecificationRef.1"
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
