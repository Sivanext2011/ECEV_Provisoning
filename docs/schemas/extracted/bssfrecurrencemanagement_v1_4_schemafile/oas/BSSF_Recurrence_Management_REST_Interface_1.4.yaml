components:
  schemas:
    ErrorMessage.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        action:
          description: "The action."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "The code."
          type: "string"
          maxLength: 256
          nullable: true
        details:
          description: "The details."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "The message."
          type: "string"
          maxLength: 256
          nullable: true
        source:
          description: "The source."
          type: "string"
          maxLength: 256
          nullable: true
    ErrorMessageExtended.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        messages:
          description: "Error messages."
          type: "array"
          items:
            $ref: "#/components/schemas/ErrorMessage.1"
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    Price.2:
      description: "Product price details corresponding to a product related to a contract."
      type: "object"
      additionalProperties: true
      properties:
        productOfferingPriceId:
          description: "The product offering price identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        productOfferingPriceExternalId:
          description: "The product offering price external identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
