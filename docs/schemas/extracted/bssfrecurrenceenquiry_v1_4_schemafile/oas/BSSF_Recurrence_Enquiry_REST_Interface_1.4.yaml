          type: "string"
          maxLength: 256
          nullable: true
        source:
          description: "The source."
          type: "string"
          maxLength: 256
          nullable: true
    ErrorMessageExtended.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        messages:
          description: "Error messages."
          type: "array"
          items:
            $ref: "#/components/schemas/ErrorMessage.1"
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    Price.2:
      description: "Product price details corresponding to a product related to a contract."
      type: "object"
      additionalProperties: true
      properties:
        productOfferingPriceId:
          description: "The product offering price identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        productOfferingPriceExternalId:
          description: "The product offering price external identifier."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    ProductReference.1:
      description: "Product Reference."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "ID of the product."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "ExternalId of the product."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    RecurrenceInformation.1:
      description: "Recurrence information for recurring events for products."
      type: "object"
      additionalProperties: true
      properties:
        nextRecurrenceAttempt:
          description: "Indicates the next recurrence attempt."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        customerId:
          description: "A unique customer ID for the customer to use for the related recurrence information."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        customerExternalId:
          description: "A customer ID provided by an external system for the customer for the related recurrence information."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contractId:
          description: "A unique contract ID for the customer for the related recurrence information."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contractExternalId:
          description: "A contract ID provided by an external system for the contract for the related recurrence information."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        productId:
          description: "A unique product ID for the product for the related recurrence information."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
          deprecated: true
        productExternalId:
          description: "A product ID provided by an external system for the product for the related recurrence information."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
          deprecated: true
        recurrenceScheduleInformation:
          description: "Recurrence schedule information."
          type: "array"
          items:
            $ref: "#/components/schemas/RecurrenceScheduleInformation.1"
    RecurrenceScheduleInformation.1:
      description: "Recurrence schedule information."
      type: "object"
      additionalProperties: true
      properties:
        lastEvaluationDate:
          description: "Last evaluation date."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        nextEvaluationDate:
          description: "Next evaluation date."
          type: "string"
          pattern: "^\\d{4}-(((0[13578]|1[02])-(0[1-9]|[12][0-9]|3[01]))|(02-(0[1-9]|[12][0-9]))|((0[469]|11)-(0[1-9]|[12][0-9]|30)))T(([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}|(24:00:00.000))(Z|\\+((0[0-9]|1[0-3]):[0-5][0-9]|14:00)|-((0[0-9]|1[0-1]):[0-5][0-9]|12:00))$"
        scheduleDefinitionId:
          description: "A unique identifier of the schedule definition for the recurrence."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        scheduleDefinitionExternalId:
          description: "An external identifier of the schedule definition for the recurrence."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        price:
          description: "Price information."
          $ref: "#/components/schemas/Price.2"
        product:
          description: "Product reference."
          $ref: "#/components/schemas/ProductReference.1"
    SupplementaryError.2:
      description: "Supplementary error message structure. In case of partial error scenarios, this structure may also include successful responses to show what parts went ok."
      type: "object"
      additionalProperties: true
      properties:
        source:
          description: "Source of error."
          type: "string"
          maxLength: 256
          nullable: true
        action:
          description: "Action causing error."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "Application related code (as defined in the API or from a common list)."
          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
