components:
  schemas:
    ErrorMessage.1:
      description: "Error message."
      type: "object"
      additionalProperties: true
      properties:
        action:
          description: "The action."
          type: "string"
          maxLength: 256
          nullable: true
        code:
          description: "The code."
          type: "string"
          maxLength: 256
          nullable: true
