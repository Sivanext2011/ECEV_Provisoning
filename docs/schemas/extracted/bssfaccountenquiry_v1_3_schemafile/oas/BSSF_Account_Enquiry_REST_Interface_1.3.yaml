      type: "object"
      additionalProperties: true
      properties:
        value:
          description: "The value."
          type: "string"
          maxLength: 256
          nullable: true
        unitOfMeasure:
          description: "The unit of measure of the value."
          type: "string"
          maxLength: 32
          nullable: true
