tags:
  - name: "Settlement Account"
    description: "A settlement account is used for settlement purposes, like creation of a Settlement Statement, creation of a document for the Partner to do reconciliation, or the creation of a report for reconciliation against an incoming invoice."
servers:
  - url: "{scheme}://{host}:{port}/{deploymentComponent}"
    description: "The production API server."
    variables:
      scheme:
        description: "request scheme"
        enum:
          - "http"
          - "https"
        default: "https"
      host:
        default: "host"
        description: "This value is assigned by the service provider."
      port:
        description: "The port of the service."
        default: "8080"
      deploymentComponent:
        description: "The deploymentComponent of the service."
        default: "bae"
