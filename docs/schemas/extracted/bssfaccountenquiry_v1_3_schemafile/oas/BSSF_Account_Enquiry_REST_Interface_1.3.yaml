components:
  schemas:
    BillFormat.1:
      description: "Represents a bill format a bill structure."
      type: "object"
      additionalProperties: true
      properties:
        validFor:
          description: "The time period that the bill format is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        id:
          description: "Unique identifier for the bill format."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "External identifier of a bill format in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        characteristic:
          description: "Characteristic values of the bill format."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValue.2"
        billFormatSpecification:
          description: "Reference to the bill format specification."
          $ref: "#/components/schemas/BillFormatSpecificationRef.1"
        presentationMedia:
          description: "The list of bill presentation media for a  bill format"
          type: "array"
          items:
            $ref: "#/components/schemas/BillPresentationMedia.1"
    BillFormatSpecificationRef.1:
      description: "Bill Format Specification Reference."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the bill format specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the bill format specification in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    BillPresentationMedia.1:
      description: "Represents a bill presentation media for a bill format."
      type: "object"
      additionalProperties: true
      properties:
        validFor:
          description: "The time period that the bill presentation media is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        id:
          description: "Unique identifier for the bill presentation media."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "External identifier of a bill presentation media in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        billPresentationMediaSpecification:
          description: "Reference to the bill presentation media specification."
          $ref: "#/components/schemas/BillPresentationMediaSpecificationRef.1"
    BillPresentationMediaSpecificationRef.1:
      description: "Bill Presentation Media Specification Reference."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the bill presentation media specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the bill presentation media specification in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    BillStructure.1:
      description: "Represents a bill structure for a billing account."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier for the bill structure."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "External identifier of a bill structure in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        characteristic:
          description: "Characteristic values of the bill structure."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValue.2"
        billStructureSpecification:
          description: "Reference to the bill structure specification."
          $ref: "#/components/schemas/BillStructureSpecificationRef.1"
        cycleSpecification:
          description: "Settlement cycle specification. Reference to the used bill cycle specification."
          type: "array"
          items:
            $ref: "#/components/schemas/CustomerBillCycleSpecification.2"
        format:
          description: "Bill formats of a  bill structure."
          type: "array"
          items:
            $ref: "#/components/schemas/BillFormat.1"
    BillStructureSpecificationRef.1:
      description: "Bill Structure Specification Reference."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the bill structure specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "Identifier of the bill structure specification in an external system."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    CharacteristicValue.2:
      description: "A value of a Characteristic."
      type: "object"
      additionalProperties: true
      properties:
        charSpecId:
          description: "The ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        charSpecExternalId:
          description: "The External ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        validFor:
          description: "The time period that the characteristic value is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        value:
          description: "The versions of the value."
          type: "array"
          items:
            $ref: "#/components/schemas/ValueWithUoM.1"
        comprisedOf:
          description: "Child/Children of the characteristic value, if any."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValueNoValidFor.1"
    CharacteristicValueNoValidFor.1:
      description: "A value of a Characteristic."
      type: "object"
      additionalProperties: true
      properties:
        charSpecId:
          description: "The ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        charSpecExternalId:
          description: "The External ID of the characteristic specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        value:
          description: "The versions of the value."
          type: "array"
          items:
            $ref: "#/components/schemas/ValueWithUoM.1"
        comprisedOf:
          description: "Child/Children of the characteristic value, if any."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValueNoValidFor.1"
    ContactMediumAssociation.1:
      description: "Represents an assignment of a contact medium to an entity."
      type: "object"
      additionalProperties: true
      properties:
        contactRole:
          description: "Represents a contact role."
          type: "string"
          maxLength: 32
          nullable: true
        validFor:
          description: "Time period where the contact medium association is valid."
          $ref: "#/components/schemas/TimePeriod.1"
        contactMediumId:
          description: "The reference to a contact medium using id."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        contactMediumExternalId:
          description: "The reference to a contact medium using external id."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        language:
          description: "The language used for communication."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    CustomerBillCycleSpecification.2:
      description: "Data structure used to link a bill cycle to a bill specification."
      type: "object"
      additionalProperties: true
      properties:
        id:
          description: "Unique identifier of the account's bill cycle specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        externalId:
          description: "External identifier of the account's bill cycle specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        billCycleSpecId:
          description: "Unique identifier of the associated bill cycle specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        billCycleSpecExternalId:
          description: "External identifier of the associated bill cycle specification."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        characteristic:
          description: "Personalized characteristic values."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValue.2"
        validFor:
          description: "The time period the bill cycle spec is valid for."
          $ref: "#/components/schemas/TimePeriod.1"
        billCycleChangeType:
          description: "Pro-rationing information that is used when doing a bill cycle change."
          type: "string"
          enum:
            - "NO_PRORATE"
            - "PRORATE_END_CURRENT"
            - "PRORATE_POS_START_NEW"
            - "PRORATE_NEG_START_NEW"
    ErrorMessageExtended.2:
      description: "Extended error message structure."
      type: "object"
      additionalProperties: true
      properties:
        supplementaryError:
          description: "Supplementary Error."
          type: "array"
          items:
            $ref: "#/components/schemas/SupplementaryError.2"
        code:
