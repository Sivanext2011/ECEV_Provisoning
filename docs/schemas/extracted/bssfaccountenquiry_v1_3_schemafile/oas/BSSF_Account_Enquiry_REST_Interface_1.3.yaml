          type: "string"
          maxLength: 256
          nullable: true
        reason:
          description: "Text that explains the reason for error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        message:
          description: "Text that provide more details and corrective actions related to the error. This can be shown to a client user."
          type: "string"
          maxLength: 256
          nullable: true
        httpStatusCode:
          description: "HTTP status code."
          type: "integer"
          format: "int64"
    Name.1:
      description: "Name is the versioned attribute element for string values that represent proper names."
      type: "object"
      additionalProperties: true
      properties:
        name:
          description: "The 'name' attribute of name version."
          type: "string"
          maxLength: 256
          nullable: true
        validFor:
          description: "Time period when the name is valid."
          $ref: "#/components/schemas/TimePeriod.1"
    RelatedParty.1:
      description: "Related Party or Party Role"
      type: "object"
      additionalProperties: true
      properties:
        '@referredType':
          description: "Referred Type."
          type: "string"
          maxLength: 128
          nullable: true
        externalId:
          description: "External identifier of the party or party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
        id:
          description: "Unique identifier of the party or party role."
          type: "string"
          pattern: "^(?=\\s*\\S).*$"
          maxLength: 256
    SettlementAccount.1:
      description: "A Party account that is used for settlement purposes, like creation of a Settlement Statement, creation of a document for the Partner to do reconciliation, or the creation of a report for reconciliation against an incoming invoice."
      type: "object"
      additionalProperties: true
      properties:
        settlementAccountSpecificationRef:
          description: "A reference to a settlement account specification."
          $ref: "#/components/schemas/SettlementAccountSpecificationRef.1"
        characteristic:
          description: "Personalized characteristic values."
          type: "array"
          items:
            $ref: "#/components/schemas/CharacteristicValue.2"
        contactMediumAssociation:
          description: "A list of contact medium association to a settlement account."
          type: "array"
          items:
            $ref: "#/components/schemas/ContactMediumAssociation.1"
        name:
          description: "The list of all version related to the name attribute."
          type: "array"
          items:
            $ref: "#/components/schemas/Name.1"
        status:
          description: "The status of the account, for example active."
          type: "array"
          items:
            $ref: "#/components/schemas/StatusExtended.1"
        billStructure:
          description: "Bill structure for a SettlementAccount."
          $ref: "#/components/schemas/BillStructure.1"
        relatedParty:
