          in: "header"
          description: "Global Unique Request ID, represents identifier for duplicate detection. If not included, a retransmission of an identical request will cause a new create/update. This type represents a Universal Unique IDentifier (UUID). The string representation is according to the definition in RFC 4122. Example value 'd616d31a-06ed-47ab-9e06-7d5c830a2b0c'."
          schema:
