          description: "The complete number to identify the resource. For an MSISDN-DCS (GSM standard 1800) this is CC + NDC + SN. For an MSISDN-PCS (GSM standard PCS 1900) this is CC + NPA + SN. For an IMSI this is MCC + MNC + MSIN. (CC = Country code, NDC = National destination code, NPA = Number planning area, SN = Subscriber number, MCC = Mobile country code, MNC = Mobile network code, MSIN = Mobile subscriber identification number)."
