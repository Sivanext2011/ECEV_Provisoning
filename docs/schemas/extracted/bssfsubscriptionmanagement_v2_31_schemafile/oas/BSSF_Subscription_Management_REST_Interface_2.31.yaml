        - name: "ERICSSON.Generic-Interface-Parameters"
          in: "header"
          description: "Generic Interface Parameters. BASE64 encoded and GZIP compressed."
          schema:
            type: "string"
            pattern: "^[a-zA-Z0-9\\+\\/]*[=]{0,2}$"
        - name: "ERICSSON.Suppress-Notification"
          in: "header"
          schema:
            description: "Suppress notification."
            type: "boolean"
          description: "The possible values are as follows:\n\n* true|True  - Do not send NTF Contract Status Change notifications\n\n* false|False - Send NTF Contract Status Change notifications\n\nIf the parameter is not passed, notification is triggered by default.\n\n"
        - name: "ERICSSON.Cascade-Termination"
          in: "header"
          schema:
            description: "Cascade termination."
            type: "boolean"
          description: "The possible values are as follows:\n\n* true|True  - Cascade the TERMINATION status change request of a parent entity to all of its sub entities\n\n* false|False - A TERMINATION status change request won't be cascaded If the parameter is not passed, the default behavior is to not cascade the TERMINATION status change request.\n\n"
        - name: "ERICSSON.RefreshBAreferenceForCBCTagging"
          in: "header"
          schema:
            description: "Refresh BA reference for CBC tagging."
            type: "boolean"
          description: "The possible values are as follows:\n\n* true|True  - If update of existing contract and product instance with BA reference based on current CEIS configuration is needed.\n\n* false|False - If update of existing contract and product instance with BA reference based on current CEIS configuration is not needed.\n\nIf the parameter is not passed, the behavior is same as described above for False value.\n\n"
        - name: "communicationId"
          in: "path"
          schema:
            description: "Communication ID value."
            type: "string"
            maxLength: 512
          required: true
          description: "communicationId Identifier."
        - name: "communicationIdType"
          in: "path"
          schema:
            description: "Communication ID type."
            type: "string"
            maxLength: 32
          required: true
          description: "communicationType."
