  /bssfSubscriptionManagement/v1/customer/{customerId}/contract:
    post:
      tags:
        - "Contract and Consumer Product"
      summary: "Create a contract for a customer."
      description: "Create a contract for a customer."
      operationId: "createContractBssfSubscriptionManagementV1CustomerContract"
      parameters:
        - name: "Accept"
          in: "header"
          description: "Accepted media type and schemas by the client. See 'responses.&lt;code&gt;.content.&lt;media-type&gt;'."
          schema:
            type: "string"
        - name: "Content-Type"
