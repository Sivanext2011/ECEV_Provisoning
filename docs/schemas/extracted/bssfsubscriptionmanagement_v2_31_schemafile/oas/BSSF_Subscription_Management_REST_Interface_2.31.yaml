tags:
  - name: "Contract and Consumer Product"
    description: "A contract is assigned to the customer and establishes a business relationship between the operator and the customer. A contract can only belong to one customer, but one customer can own several contracts."
servers:
  - url: "{scheme}://{host}:{port}/{deploymentComponent}"
    description: "The production API server."
    variables:
      scheme:
        description: "request scheme"
        enum:
          - "http"
          - "https"
        default: "https"
      host:
        default: "host"
        description: "This value is assigned by the service provider."
      port:
        description: "The port of the service."
        default: "8080"
      deploymentComponent:
        description: "The deploymentComponent of the service."
        default: "bae"
