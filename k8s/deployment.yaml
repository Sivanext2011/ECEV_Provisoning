apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecev-provisioning
  labels:
    app: ecev-provisioning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecev-provisioning
  template:
    metadata:
      labels:
        app: ecev-provisioning
    spec:
      containers:
        - name: backend
          image: ecev-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: CONFIG_PATH
              value: /app/config/config.json
          volumeMounts:
            - name: config
              mountPath: /app/config
        - name: frontend
          image: ecev-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
      volumes:
        - name: config
          configMap:
            name: ecev-config
---
apiVersion: v1
kind: Service
metadata:
  name: ecev-provisioning
spec:
  type: NodePort
  selector:
    app: ecev-provisioning
  ports:
    - name: ui
      port: 3000
      targetPort: 80
    - name: api
      port: 8000
      targetPort: 8000
