apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecev.fullname" . }}
  labels:
    {{- include "ecev.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ecev.selectorLabels" . | nindent 4 }}
  ports:
    - name: ui
      port: {{ .Values.service.uiPort }}
      targetPort: {{ .Values.frontend.port }}
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: {{ .Values.backend.port }}
