apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecev.fullname" . }}
  labels:
    {{- include "ecev.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ecev.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ecev.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: CONFIG_PATH
              value: /app/config/config.json
            - name: CATALOG_PATH
              value: /app/config/catalog.json
          envFrom:
            - secretRef:
                name: {{ include "ecev.fullname" . }}-auth
                optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /docs
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ecev.fullname" . }}-config
